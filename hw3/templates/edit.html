{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h4 class="mb-0">Edit Book</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Title *</label>
                        <input type="text" name="title" class="form-control" value="{{ book['title'] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Author *</label>
                        <input type="text" name="author" class="form-control" value="{{ book['author'] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Genre</label>
                        <input type="text" name="genre" class="form-control" value="{{ book['genre'] }}">
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Current Page</label>
                            <input type="number" name="current_page" class="form-control" min="0" max="{{ book['pages'] }}" value="{{ book['current_page'] }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Total Pages *</label>
                            <input type="number" name="pages" class="form-control" min="1" value="{{ book['pages'] }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option value="Want to Read" {% if book['status'] == 'Want to Read' %}selected{% endif %}>Want to Read</option>
                            <option value="Reading" {% if book['status'] == 'Reading' %}selected{% endif %}>Reading</option>
                            <option value="Finished" {% if book['status'] == 'Finished' %}selected{% endif %}>Finished</option>
                        </select>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label">Rating (1-5)</label>
                        <input type="number" name="rating" class="form-control" min="1" max="5" value="{{ book['rating'] or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Review</label>
                        <textarea name="review" class="form-control" rows="3">{{ book['review'] }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Update Book</button>
                    <a href="{{ url_for('view_book', book_id=book['id']) }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
